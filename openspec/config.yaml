schema: spec-driven

context: |
  Tech stack: Vue 3, Vite, Pinia, Vue Router, Dexie (IndexedDB), vite-plugin-pwa, Workbox
  Architecture: Component-based SPA with clear separation (components/, views/, stores/, composables/, utils/, db/, router/, data/)
  Testing: No test runner detected
  Style: Composition API, CSS with custom properties, single-file Vue components

rules:
  define:
    - Include scope in and out
    - Include rollback plan for risky changes
    - Include success criteria
    - Include normative requirements with Given/When/Then scenarios
  design:
    - Include rationale for architecture decisions
  tasks:
    - Keep tasks small and dependency-ordered
    - Make execution frontiers obvious when the change spans multiple implementation slices
    - Include `parallel_safe` and `writes` metadata per frontier
  apply:
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: "pnpm run build"
    coverage_threshold: 0
  archive:
    - Require `verify-report.md` before archiving